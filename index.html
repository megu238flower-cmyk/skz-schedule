<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SKZ SCHEDULE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #09090d;
      --bg2:    #111118;
      --bg3:    #1a1a24;
      --accent: #ffd600;
      --actext: #000000;
      --text:   #ededf5;
      --text2:  #50506a;
      --border: #1e1e2e;
      --sun:    #ff5252;
      --sat:    #4d8cff;
      --pat:    rgba(255,214,0,0.018);
      --wm:     rgba(255,214,0,0.028);
      --r: 8px;
    }

    html { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100%;
      transition: background 0.3s, color 0.3s;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        repeating-linear-gradient(-45deg, transparent 0, transparent 28px, var(--pat) 28px, var(--pat) 29px),
        repeating-linear-gradient( 45deg, transparent 0, transparent 28px, var(--pat) 28px, var(--pat) 29px);
      transition: background-image 0.3s;
    }

    /* ═══════════════════════ HEADER ═══════════════════════ */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg2);
      padding: 9px 12px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      transition: background 0.3s, border-color 0.3s;
    }
    .header::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 1.5px;
      background: linear-gradient(90deg, var(--accent), transparent 70%);
    }

    .logo { flex-shrink: 0; line-height: 1; }
    .logo-main { font-size: 20px; font-weight: 900; letter-spacing: 5px; color: var(--accent); }
    .logo-sub  { font-size: 8px; letter-spacing: 3px; color: var(--text2); margin-top: 1px; }

    .nav-group { display: flex; align-items: center; gap: 8px; }

    .nav-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text); width: 34px; height: 34px; border-radius: var(--r);
      font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.2s, color 0.2s;
    }
    .nav-btn:active { border-color: var(--accent); color: var(--accent); }

    .month-disp { font-size: 16px; font-weight: 700; min-width: 120px; text-align: center; }

    .header-right { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

    .today-btn {
      background: none; border: 1px solid var(--border); color: var(--text2);
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      padding: 6px 10px; border-radius: var(--r); cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.2s, color 0.2s;
    }
    .today-btn:active { border-color: var(--accent); color: var(--accent); }

    .theme-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: border-color 0.2s; flex-shrink: 0;
    }
    .theme-btn:active { border-color: var(--accent); }

    .mgr-btn {
      background: var(--accent); color: var(--actext); border: none;
      font-size: 11px; font-weight: 800; letter-spacing: 1px;
      padding: 7px 12px; border-radius: var(--r); cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    /* ═══════════════════════ THEME PICKER ═══════════════════════ */
    .theme-picker {
      position: fixed; z-index: 300;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
      top: 60px; right: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transition: background 0.3s, border-color 0.3s;
    }
    .theme-picker.hide { display: none; }

    .theme-swatch {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .swatch-circle {
      width: 40px; height: 40px; border-radius: 50%;
      border: 3px solid transparent;
      transition: border-color 0.2s, transform 0.15s;
    }
    .swatch-circle:active { transform: scale(0.9); }
    .swatch-circle.active { border-color: var(--accent); }
    .swatch-name { font-size: 10px; color: var(--text2); text-align: center; }

    /* ═══════════════════════ WEEKDAYS ═══════════════════════ */
    .weekdays {
      position: sticky; top: 55px; z-index: 99;
      display: grid; grid-template-columns: repeat(7, 1fr);
      background: var(--bg2); border-bottom: 1px solid var(--border);
      transition: background 0.3s, border-color 0.3s;
    }
    .wd {
      text-align: center; font-size: 11px; font-weight: 700;
      letter-spacing: 1px; padding: 6px 0; color: var(--text2);
    }
    .wd.sun { color: var(--sun); }
    .wd.sat { color: var(--sat); }

    /* ═══════════════════════ CALENDAR ═══════════════════════ */
    .cal-area { padding: 4px 4px 0; position: relative; z-index: 1; }

    .cal-area::before {
      content: 'SKZ';
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      font-size: clamp(100px, 20vw, 200px);
      font-weight: 900; letter-spacing: 16px;
      color: var(--wm);
      pointer-events: none; z-index: 0; user-select: none;
      transition: color 0.3s;
    }

    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 3px; position: relative; z-index: 1;
    }

    .day {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r); min-height: 72px; padding: 3px;
      cursor: pointer; overflow: hidden;
      display: flex; flex-direction: column;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.12s, background 0.3s;
      position: relative;
    }
    .day:active { border-color: var(--accent); }
    .day.other  { opacity: 0.2; pointer-events: none; }
    .day.has-data { border-color: rgba(128,128,128,0.3); }
    .day.selected { border-color: var(--accent); border-width: 2px; }
    .day.today .day-num { background: var(--accent); color: var(--actext); border-radius: 50%; }

    .day-num {
      font-size: 12px; font-weight: 700;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .day-num.mon-sat { color: var(--sat); }
    .day-num.mon-sun { color: var(--sun); }

    .stamp-row {
      display: flex; flex-wrap: wrap; gap: 2px; margin-top: 2px;
    }
    .s-mini {
      width: 20px; height: 20px; border-radius: 3px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; background: var(--bg3); flex-shrink: 0;
    }
    .s-mini img { width: 100%; height: 100%; object-fit: cover; }
    .s-more {
      width: 20px; height: 20px; border-radius: 3px; background: var(--bg3);
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; color: var(--text2);
    }

    .day-time-preview {
      font-size: 8px; color: var(--accent); margin-top: 1px; font-weight: 600;
    }
    .day-note-preview {
      font-size: 8px; color: var(--text2); margin-top: 1px;
      overflow: hidden; line-height: 1.3;
    }

    .img-badge {
      position: absolute; top: 2px; right: 2px;
      font-size: 10px; opacity: 0.7;
    }

    /* ═══════════════════════ DETAIL PANEL ═══════════════════════ */
    .detail-panel {
      margin: 4px 4px 0; padding: 14px 14px 100px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r);
      min-height: 180px;
      transition: background 0.3s, border-color 0.3s;
      position: relative; z-index: 1;
    }

    .detail-empty {
      color: var(--text2); font-size: 13px; text-align: center;
      padding: 40px 0; letter-spacing: 1px;
    }

    .detail-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
    }
    .detail-date-str { font-size: 17px; font-weight: 800; color: var(--accent); }
    .detail-edit-btn {
      background: var(--accent); color: var(--actext); border: none;
      font-size: 12px; font-weight: 800; letter-spacing: 1px;
      padding: 7px 16px; border-radius: var(--r); cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .detail-section { margin-bottom: 12px; }
    .detail-lbl {
      font-size: 9px; font-weight: 700; letter-spacing: 2px;
      color: var(--text2); margin-bottom: 6px;
    }

    .detail-stamps-row {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px;
    }
    .detail-stamp {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .detail-stamp-thumb {
      width: 36px; height: 36px; border-radius: 6px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; background: var(--bg3);
    }
    .detail-stamp-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .detail-stamp-name { font-size: 8px; color: var(--text2); text-align: center; }

    .detail-time {
      font-size: 16px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 6px;
    }
    .detail-time-icon { font-size: 14px; }
    .detail-loc {
      font-size: 13px; color: var(--text2); margin-top: 4px;
    }

    .detail-note-text {
      font-size: 14px; line-height: 1.7; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
    }

    .detail-img-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--r); padding: 10px 14px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s;
      margin-top: 8px;
    }
    .detail-img-btn:active { border-color: var(--accent); }
    .detail-img-preview {
      width: 40px; height: 40px; border-radius: 4px; overflow: hidden; flex-shrink: 0;
    }
    .detail-img-preview img { width: 100%; height: 100%; object-fit: cover; }
    .detail-img-label { font-size: 13px; color: var(--text); }
    .detail-img-sub   { font-size: 10px; color: var(--text2); }

    /* ═══════════════════════ PALETTE ═══════════════════════ */
    .palette {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: var(--bg2); border-top: 1px solid var(--border);
      padding: 6px 8px;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.3s, border-color 0.3s;
    }

    .text-mode-btn {
      flex-shrink: 0; width: 50px; height: 50px;
      border-radius: var(--r); border: 2px solid var(--border);
      background: var(--bg3); cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 18px; color: var(--text2); gap: 2px;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s, background 0.15s;
    }
    .text-mode-btn.active {
      border-color: var(--accent); color: var(--accent);
      background: rgba(128,128,0,0.08);
    }
    .btn-label { font-size: 8px; font-weight: 700; letter-spacing: 0.5px; }

    .pal-sep { width: 1px; height: 36px; background: var(--border); flex-shrink: 0; }

    .pal-stamps {
      display: flex; gap: 5px; overflow-x: auto; flex: 1;
      -webkit-overflow-scrolling: touch;
    }
    .pal-stamps::-webkit-scrollbar { display: none; }

    .p-stamp {
      flex-shrink: 0; width: 50px; height: 50px;
      border-radius: var(--r); border: 2px solid var(--border);
      background: var(--bg3); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; overflow: hidden; position: relative;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s;
    }
    .p-stamp.sel {
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(128,100,0,0.3);
    }
    .p-stamp img { width: 100%; height: 100%; object-fit: cover; }
    .p-lbl {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.72); font-size: 7px; text-align: center;
      padding: 1px 2px; color: #fff; line-height: 1.4;
    }

    .hint-bar {
      font-size: 10px; color: var(--text2); text-align: center;
      padding: 3px 8px 1px;
      flex-shrink: 0; white-space: nowrap; letter-spacing: 0.5px;
      position: fixed; bottom: 64px; left: 0; right: 0; z-index: 49;
      pointer-events: none; background: transparent;
    }
    .hint-bar.stamp-on { color: var(--accent); font-weight: 700; }

    /* ═══════════════════════ DAY MODAL ═══════════════════════ */
    .overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.8);
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      overflow: hidden;
    }
    .overlay.hide { display: none; }

    .modal {
      background: var(--bg2); width: 100%; max-width: 760px;
      border-radius: 20px 20px 0 0; border-top: 2.5px solid var(--accent);
      padding: 18px 14px 24px;
      height: 88svh; height: 88vh; overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
      transition: background 0.3s;
    }

    .modal-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    .modal-date-str { font-size: 18px; font-weight: 800; color: var(--accent); }
    .close-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--bg3); border: none; color: var(--text);
      font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .sec-lbl {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      color: var(--text2); margin-bottom: 7px;
    }

    .entry-num {
      font-size: 11px; color: var(--accent); font-weight: 700;
      margin: 10px 0 6px;
    }
    .entry-divider {
      border: none; border-top: 1px dashed var(--border);
      margin: 16px 0 12px;
    }

    /* Time + Note row */
    .time-note-row {
      display: flex; gap: 10px; margin-bottom: 6px;
    }
    .time-wrap {
      flex-shrink: 0; display: flex; flex-direction: column;
    }
    .note-wrap { flex: 1; display: flex; flex-direction: column; }

    .time-input {
      height: 50px; width: 120px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--text);
      font-size: 18px; font-weight: 700; font-family: inherit;
      padding: 0 10px; -webkit-appearance: none; cursor: pointer;
      transition: border-color 0.15s, background 0.3s;
    }
    .time-input:focus { outline: none; border-color: var(--accent); }
    .time-clear-btn {
      font-size: 9px; color: var(--text2); background: none; border: none;
      cursor: pointer; margin-top: 4px; text-align: center; padding: 2px;
      -webkit-tap-highlight-color: transparent;
    }
    .time-clear-btn:active { color: var(--sun); }

    .note-area {
      flex: 1; min-height: 80px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--text);
      font-size: 14px; font-family: inherit;
      padding: 10px 12px; resize: none; line-height: 1.7;
      transition: border-color 0.15s, background 0.3s;
    }
    .note-area:focus { outline: none; border-color: var(--accent); }

    /* Location input */
    .loc-input {
      width: 100%; height: 40px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--text);
      font-size: 14px; font-family: inherit;
      padding: 0 12px; margin-bottom: 6px;
      transition: border-color 0.15s, background 0.3s;
    }
    .loc-input:focus { outline: none; border-color: var(--accent); }
    .loc-input::placeholder { color: var(--text2); }

    /* Per-entry compact photo attach */
    .img-attach-sm {
      background: var(--bg3); border: 1px dashed var(--border);
      border-radius: var(--r); padding: 8px 12px;
      cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s, background 0.3s;
    }
    .img-attach-sm:active { border-color: var(--accent); }
    .img-attach-sm.has-img { border-style: solid; border-color: rgba(128,100,0,0.4); }
    .img-sm-thumb {
      width: 40px; height: 40px; border-radius: 6px; overflow: hidden;
      flex-shrink: 0; background: var(--bg2);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .img-sm-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .img-sm-info { flex: 1; }
    .img-sm-label { font-size: 12px; color: var(--text); font-weight: 600; }
    .img-sm-sub   { font-size: 10px; color: var(--text2); margin-top: 2px; }
    .img-remove-sm {
      background: none; border: 1px solid var(--border);
      color: var(--sun); font-size: 10px; padding: 4px 8px;
      border-radius: var(--r); cursor: pointer; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* Stamp grid in modal */
    .modal-stamps-grid {
      display: grid; grid-template-columns: repeat(6, 1fr);
      gap: 7px; margin-bottom: 16px;
    }

    .m-stamp {
      border: 2px solid var(--border); border-radius: var(--r);
      background: var(--bg3); padding: 7px 4px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.1s, background 0.1s;
    }
    .m-stamp.on { border-color: var(--accent); background: rgba(128,100,0,0.1); }
    .m-thumb {
      width: 38px; height: 38px; border-radius: 6px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; background: var(--bg2);
    }
    .m-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .m-name { font-size: 8px; color: var(--text2); text-align: center; line-height: 1.3; }

    .clear-btn {
      width: 100%; background: transparent; color: var(--text2);
      border: 1.5px solid var(--border); padding: 12px; border-radius: var(--r);
      font-size: 13px; cursor: pointer; margin-bottom: 10px;
      -webkit-tap-highlight-color: transparent;
    }
    .save-btn {
      width: 100%; background: var(--accent); color: var(--actext); border: none;
      padding: 14px; border-radius: var(--r);
      font-size: 15px; font-weight: 900; letter-spacing: 3px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ═══════════════════════ STAMP MANAGER ═══════════════════════ */
    .manager {
      position: fixed; inset: 0; z-index: 300;
      background: var(--bg); display: flex; flex-direction: column;
      transition: background 0.3s;
    }
    .manager.hide { display: none; }

    .mgr-hdr {
      background: var(--bg2); border-bottom: 1.5px solid var(--border);
      padding: 13px 14px; display: flex; align-items: center; gap: 12px;
      flex-shrink: 0; position: relative;
      transition: background 0.3s, border-color 0.3s;
    }
    .mgr-hdr::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, var(--accent), transparent 60%);
    }
    .back-btn {
      background: none; border: 1px solid var(--border); color: var(--text);
      padding: 8px 14px; border-radius: var(--r); font-size: 13px; cursor: pointer;
      -webkit-tap-highlight-color: transparent; transition: border-color 0.2s;
      flex-shrink: 0;
    }
    .back-btn:active { border-color: var(--accent); color: var(--accent); }
    .mgr-title { font-size: 16px; font-weight: 900; letter-spacing: 3px; color: var(--accent); flex: 1; }
    .sort-btn {
      background: none; border: 1px solid var(--border); color: var(--text2);
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
      padding: 7px 12px; border-radius: var(--r); cursor: pointer;
      -webkit-tap-highlight-color: transparent; transition: border-color 0.2s, color 0.2s;
      white-space: nowrap; flex-shrink: 0;
    }
    .sort-btn:active { border-color: var(--accent); color: var(--accent); }

    .mgr-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 14px; }

    .cat-section { margin-bottom: 28px; }
    .cat-title {
      font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--text2);
      margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .slot-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

    .slot {
      background: var(--bg2); border: 2px dashed var(--border);
      border-radius: 12px; padding: 12px 6px;
      display: flex; flex-direction: column; align-items: center; gap: 7px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s, background 0.3s;
    }
    .slot:active { border-color: var(--accent); }
    .slot.uploaded { border-style: solid; border-color: rgba(128,100,0,0.4); }
    .slot-thumb {
      width: 58px; height: 58px; border-radius: 10px; overflow: hidden;

function getEntryArr(v) {
  if (!v) return ['', '', ''];

// ─── Stamp order ──────────────────────────────────────
function getOrderedStamps() {
  const order = db.stampOrder || [];
  const allIds = STAMPS.map(s => s.id);
  // Existing order, filtered to valid IDs, plus any new IDs appended
  const valid   = order.filter(id => allIds.includes(id));
  const missing = allIds.filter(id => !valid.includes(id));
  return [...valid, ...missing].map(id => STAMPS.find(s => s.id === id)).filter(Boolean);
}

// ═══════════════════════════════════════════════════════
// IMAGE COMPRESSION
// ═══════════════════════════════════════════════════════
function compress(file, maxPx, quality) {
  return new Promise(res => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const r = Math.min(maxPx / img.width, maxPx / img.height, 1);
        const c = document.createElement('canvas');
        c.width  = Math.round(img.width  * r);
        c.height = Math.round(img.height * r);
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        const hasAlpha = file.type === 'image/png' || file.type === 'image/gif' || file.type === 'image/webp';
        res(c.toDataURL(hasAlpha ? 'image/png' : 'image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

  el.style.cssText = `width:${px}px;height:${px}px;border-radius:${br}px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:${Math.round(px*0.55)}px;background:var(--bg3);flex-shrink:0;`;

    const img = document.createElement('img');
    img.src = db.images[stampId];
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
    el.appendChild(img);
  } else {
    el.textContent = def.emoji;
  }
  return el;
}

// ═══════════════════════════════════════════════════════
// CALENDAR
// ═══════════════════════════════════════════════════════
function renderCalendar() {
  document.getElementById('monthDisp').textContent = `${curY}\u5e74${JM[curM]}`;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const firstDowRaw  = new Date(curY, curM, 1).getDay();
  const firstDow     = (firstDowRaw + 6) % 7;
  const daysInMo     = new Date(curY, curM + 1, 0).getDate();
  const daysInPrev   = new Date(curY, curM, 0).getDate();

  const today   = new Date();
  const todayKey = dk(today.getFullYear(), today.getMonth(), today.getDate());

  for (let i = firstDow - 1; i >= 0; i--)
    grid.appendChild(makeCell(curY, curM - 1, daysInPrev - i, true, todayKey));

  for (let d = 1; d <= daysInMo; d++)
    grid.appendChild(makeCell(curY, curM, d, false, todayKey));

  const total = Math.ceil((firstDow + daysInMo) / 7) * 7;
  for (let d = 1; d <= total - firstDow - daysInMo; d++)
    grid.appendChild(makeCell(curY, curM + 1, d, true, todayKey));
}

function makeCell(y, m, d, other, todayKey) {
  const real = new Date(y, m, d);
  const ry = real.getFullYear(), rm = real.getMonth(), rd = real.getDate();
  const key  = dk(ry, rm, rd);
  const dow  = real.getDay();
  const monDow = (dow + 6) % 7;

  const places = db.placements[key] || [];
  const notes  = getEntryArr(db.notes[key]);
  const times  = getEntryArr(db.times[key]);
  const locs   = getLocArr(db.locs[key]);
  const imgs   = getImgArr(db.dayImages[key]);

  const cell = document.createElement('div');
  let cls = 'day';
  if (other)          cls += ' other';
  if (key === todayKey) cls += ' today';
  if (key === selKey) cls += ' selected';
  if (places.length || notes.some(n=>n) || times.some(t=>t) || locs.some(l=>l) || imgs.some(img=>img)) cls += ' has-data';
  cell.className = cls;

  const numEl = document.createElement('div');
  let numCls = 'day-num';
  if (monDow === 5) numCls += ' mon-sat';
  if (monDow === 6) numCls += ' mon-sun';
  numEl.className = numCls;
  numEl.textContent = rd;
  cell.appendChild(numEl);

  // Camera badge (any of 3 photos)
  if (imgs.some(img => img)) {
    const badge = document.createElement('div');
    badge.className = 'img-badge'; badge.textContent = '\uD83D\uDCF7';
    cell.appendChild(badge);
  }

  // Stamps
  if (places.length > 0) {
    const row = document.createElement('div');
    row.className = 'stamp-row';
    places.slice(0, 5).forEach(sid => {
      const mini = makeThumb(sid, 20);
      if (mini) row.appendChild(mini);
    });
    if (places.length > 5) {
      const more = document.createElement('div');
      more.className = 's-more'; more.textContent = '+' + (places.length - 5);
      row.appendChild(more);
    }
    cell.appendChild(row);
  }

  // Time (first entry)
  if (times[0]) {
    const te = document.createElement('div');
    te.className = 'day-time-preview'; te.textContent = '\u23F0' + times[0];
    cell.appendChild(te);
  }

  // Note (first entry)
  if (notes[0]) {
    const ne = document.createElement('div');
    ne.className = 'day-note-preview'; ne.textContent = notes[0].substring(0, 28);
    cell.appendChild(ne);
  }

  // Show "+N件" for additional entries
  const extraCount = [1,2].filter(i => notes[i] || times[i] || locs[i] || imgs[i]).length;
  if (extraCount > 0) {
    const ex = document.createElement('div');
    ex.className = 'day-note-preview';
    ex.style.color = 'var(--text2)'; ex.textContent = '+' + extraCount + '\u4EF6';
    cell.appendChild(ex);
  }

  cell.addEventListener('click', () => {
    if (selStamp) {
      const arr = [...(db.placements[key] || [])];
      const idx = arr.indexOf(selStamp);
      if (idx >= 0) arr.splice(idx, 1); else arr.push(selStamp);
      if (arr.length > 0) db.placements[key] = arr; else delete db.placements[key];
      saveDB(); renderCalendar(); renderDetail();
    } else {
      selKey = key;
      renderCalendar();
      renderDetail();
    }
  });

  return cell;
}

// ═══════════════════════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════════════════════
function renderDetail() {
  const panel = document.getElementById('detailPanel');
  if (!selKey) {
    panel.innerHTML = '<div class="detail-empty">\u2190 \u65E5\u4ED8\u3092\u30BF\u30C3\u30D7\u3059\u308B\u3068\u8A73\u7D30\u304C\u8868\u793A\u3055\u308C\u307E\u3059</div>';
    return;
  }

  const [sy, sm, sd] = selKey.split('-').map(Number);
  const real = new Date(sy, sm - 1, sd);
  const dow  = DOW_JP[real.getDay()];
  const dateStr = `${sy}\u5e74${sm}\u6708${sd}\u65E5\uFF08${dow}\uFF09`;

  const places  = db.placements[selKey] || [];
  const notes   = getEntryArr(db.notes[selKey]);
  const times   = getEntryArr(db.times[selKey]);
  const locs    = getLocArr(db.locs[selKey]);
  const imgs    = getImgArr(db.dayImages[selKey]);
  const hasMultiEntry = [1,2].some(i => notes[i] || times[i] || locs[i] || imgs[i]);

  panel.innerHTML = '';

  // Top row
  const top = document.createElement('div');
  top.className = 'detail-top';
  top.innerHTML = `<div class="detail-date-str">${dateStr}</div>`;
  const editBtn = document.createElement('button');
  editBtn.className = 'detail-edit-btn'; editBtn.textContent = '\u7DE8\u96C6';
  editBtn.addEventListener('click', () => openModal(sy, sm - 1, sd));
  top.appendChild(editBtn);
  panel.appendChild(top);

  // Stamps
  if (places.length > 0) {
    const sec = document.createElement('div'); sec.className = 'detail-section';
    const lbl = document.createElement('div'); lbl.className = 'detail-lbl'; lbl.textContent = 'STAMPS';
    sec.appendChild(lbl);
    const row = document.createElement('div'); row.className = 'detail-stamps-row';
    places.forEach(sid => {
      const def = STAMPS.find(s => s.id === sid);
      if (!def) return;
      const wrap = document.createElement('div'); wrap.className = 'detail-stamp';
      const th = document.createElement('div'); th.className = 'detail-stamp-thumb';
      if (db.images[sid]) {
        const img = document.createElement('img'); img.src = db.images[sid];
        th.appendChild(img);
      } else { th.textContent = def.emoji; }
      const nm = document.createElement('div'); nm.className = 'detail-stamp-name'; nm.textContent = def.name;
      wrap.appendChild(th); wrap.appendChild(nm); row.appendChild(wrap);
    });
    sec.appendChild(row); panel.appendChild(sec);
  }

  // Time / Loc / Note / Photo (up to 3 entries)
  for (let i = 0; i < 3; i++) {
    if (!times[i] && !notes[i] && !locs[i] && !imgs[i]) continue;
    const sec = document.createElement('div'); sec.className = 'detail-section';
    if (hasMultiEntry) {
      const numLbl = document.createElement('div'); numLbl.className = 'detail-lbl';
      numLbl.textContent = ENTRY_NUMS[i];
      sec.appendChild(numLbl);
    } else {
      const lbl = document.createElement('div'); lbl.className = 'detail-lbl'; lbl.textContent = 'SCHEDULE';
      sec.appendChild(lbl);
    }
    if (times[i]) {
      const tv = document.createElement('div'); tv.className = 'detail-time';
      tv.innerHTML = `<span class="detail-time-icon">\u23F0</span><span>${times[i]}</span>`;
      sec.appendChild(tv);
    }
    if (locs[i]) {
      const lv = document.createElement('div'); lv.className = 'detail-loc';
      lv.textContent = '\uD83D\uDCCD ' + locs[i];
      sec.appendChild(lv);
    }
    if (notes[i]) {
      const nt = document.createElement('div'); nt.className = 'detail-note-text'; nt.textContent = notes[i];
      sec.appendChild(nt);
    }
    if (imgs[i]) {
      const btn = document.createElement('div'); btn.className = 'detail-img-btn';
      btn.innerHTML = `
        <div class="detail-img-preview"><img src="${imgs[i]}" alt="photo"></div>
        <div>
          <div class="detail-img-label">\u5199\u771F${ENTRY_NUMS[i]}\u3092\u898B\u308B</div>
          <div class="detail-img-sub">\u30BF\u30C3\u30D7\u3057\u3066\u62E1\u5927\u8868\u793A</div>
        </div>`;
      btn.addEventListener('click', () => openViewer(imgs[i]));
      sec.appendChild(btn);
    }
    panel.appendChild(sec);
  }

  // Empty state
  if (!places.length && !notes.some(n=>n) && !times.some(t=>t) && !locs.some(l=>l) && !imgs.some(img=>img)) {
    const empty = document.createElement('div');
    empty.className = 'detail-empty';
    empty.textContent = '\u300C\u7DE8\u96C6\u300D\u3092\u30BF\u30C3\u30D7\u3057\u3066\u30B9\u30B1\u30B8\u30E5\u30FC\u30EB\u3092\u8FFD\u52A0';
    panel.appendChild(empty);
  }
}

// ═══════════════════════════════════════════════════════
// DAY MODAL
// ═══════════════════════════════════════════════════════
let editKey       = null;
let modalAct      = new Set();
let pendingDayImgs = [null, null, null];
let imgUploadIdx  = 0;

function openModal(y, m, d) {
  const real = new Date(y, m, d);
  editKey = dk(real.getFullYear(), real.getMonth(), real.getDate());

  const dow = DOW_JP[real.getDay()];
  document.getElementById('modalDateStr').textContent =
    `${real.getFullYear()}\u5e74${real.getMonth()+1}\u6708${real.getDate()}\u65E5\uFF08${dow}\uFF09`;

  const entryNotes = getEntryArr(db.notes[editKey]);
  const entryTimes = getEntryArr(db.times[editKey]);
  const entryLocs  = getLocArr(db.locs[editKey]);
  for (let i = 0; i < 3; i++) {
    document.getElementById('noteArea'  + i).value = entryNotes[i];
    document.getElementById('timeInput' + i).value = entryTimes[i];
    document.getElementById('locInput'  + i).value = entryLocs[i];
  }

  pendingDayImgs = getImgArr(db.dayImages[editKey]);
  for (let i = 0; i < 3; i++) updateImgSmUI(i);

  modalAct = new Set(db.placements[editKey] || []);
  renderModalStamps();
  document.getElementById('dayOverlay').classList.remove('hide');
}

function closeDayOverlay() {
  document.getElementById('dayOverlay').classList.add('hide');
}

function updateImgSmUI(i) {
  const area  = document.getElementById('imgAttachSm' + i);
  const thumb = document.getElementById('imgSmThumb' + i);
  const label = document.getElementById('imgSmLabel' + i);
  const remBtn = document.getElementById('imgRemoveSm' + i);
  if (pendingDayImgs[i]) {
    area.classList.add('has-img');
    thumb.innerHTML = `<img src="${pendingDayImgs[i]}" alt="preview" style="width:100%;height:100%;object-fit:cover;border-radius:4px;">`;
    label.textContent = `\u5199\u771F${ENTRY_NUMS[i]}\u3042\u308A\uFF08\u30BF\u30C3\u30D7\u3057\u3066\u5909\u66F4\uFF09`;
    remBtn.classList.remove('hide');
  } else {
    area.classList.remove('has-img');
    thumb.innerHTML = '\uD83D\uDCF7';
    label.textContent = `\u5199\u771F${ENTRY_NUMS[i]}\u3092\u6DFB\u4ED8`;
    remBtn.classList.add('hide');
  }
}

// Per-entry photo attach events
for (let i = 0; i < 3; i++) {
  (function(idx) {
    document.getElementById('imgAttachSm' + idx).addEventListener('click', e => {
      if (e.target.closest('.img-remove-sm')) return;
      imgUploadIdx = idx;
      document.getElementById('dayImgIn').click();
    });
    document.getElementById('imgRemoveSm' + idx).addEventListener('click', e => {
      e.stopPropagation();
      pendingDayImgs[idx] = null;
      updateImgSmUI(idx);
    });
  })(i);
}

document.querySelectorAll('.time-clear-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('timeInput' + btn.dataset.idx).value = '';
  });
});

function renderModalStamps() {
  const grid = document.getElementById('modalStampsGrid');
  grid.innerHTML = '';
  getOrderedStamps().forEach(def => {
    const item = document.createElement('div');
    item.className = 'm-stamp' + (modalAct.has(def.id) ? ' on' : '');
    const th = document.createElement('div'); th.className = 'm-thumb';
    if (db.images[def.id]) {
      const img = document.createElement('img'); img.src = db.images[def.id]; th.appendChild(img);
    } else { th.textContent = def.emoji; }
    const nm = document.createElement('div'); nm.className = 'm-name'; nm.textContent = def.name;
    item.appendChild(th); item.appendChild(nm);
    item.addEventListener('click', () => {
      if (modalAct.has(def.id)) modalAct.delete(def.id); else modalAct.add(def.id);
      item.classList.toggle('on');
    });
    grid.appendChild(item);
  });
}

document.getElementById('saveBtn').addEventListener('click', () => {
  const txts = [0,1,2].map(i => document.getElementById('noteArea'  + i).value.trim());
  const tims = [0,1,2].map(i => document.getElementById('timeInput' + i).value);
  const locs = [0,1,2].map(i => document.getElementById('locInput'  + i).value.trim());

  if (txts.some(t => t)) db.notes[editKey] = txts; else delete db.notes[editKey];
  if (tims.some(t => t)) db.times[editKey] = tims; else delete db.times[editKey];
  if (locs.some(l => l)) db.locs[editKey]  = locs; else delete db.locs[editKey];
  if (pendingDayImgs.some(img => img)) db.dayImages[editKey] = [...pendingDayImgs];
  else delete db.dayImages[editKey];
  if (modalAct.size > 0) db.placements[editKey] = [...modalAct]; else delete db.placements[editKey];

  saveDB();
  if (selKey === editKey) renderDetail();
  renderCalendar();
  closeDayOverlay();
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (!editKey) return;
  delete db.notes[editKey]; delete db.times[editKey];
  delete db.locs[editKey]; delete db.placements[editKey]; delete db.dayImages[editKey];
  pendingDayImgs = [null, null, null];
  for (let i = 0; i < 3; i++) updateImgSmUI(i);
  for (let i = 0; i < 3; i++) {
    document.getElementById('noteArea'  + i).value = '';
    document.getElementById('timeInput' + i).value = '';
    document.getElementById('locInput'  + i).value = '';
  }
  modalAct.clear();
  renderModalStamps();
  saveDB(); renderCalendar(); renderDetail();
  closeDayOverlay();
});

document.getElementById('closeModal').addEventListener('click', () => closeDayOverlay());
document.getElementById('dayOverlay').addEventListener('click', e => {
  if (e.target.id === 'dayOverlay') closeDayOverlay();
});

document.getElementById('dayImgIn').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  pendingDayImgs[imgUploadIdx] = await compress(file, 600, 0.68);
  updateImgSmUI(imgUploadIdx);
  e.target.value = '';
});

}
document.getElementById('viewerClose').addEventListener('click', () =>
  document.getElementById('imgViewer').classList.add('hide'));

// ═══════════════════════════════════════════════════════
// STAMP MANAGER
// ═══════════════════════════════════════════════════════
let uploadTarget = null;

function renderManager() {
  const body = document.getElementById('mgrBody');
  body.innerHTML = '';
  CATS.forEach(cat => {
    const stamps = getOrderedStamps().filter(s => s.cat === cat.key);
    if (stamps.length === 0) return;
    const sec = document.createElement('div'); sec.className = 'cat-section';
    const t = document.createElement('div'); t.className = 'cat-title'; t.textContent = cat.label;
    sec.appendChild(t);
    const sg = document.createElement('div'); sg.className = 'slot-grid';
    stamps.forEach(def => {
      const slot = document.createElement('div');
      slot.className = 'slot' + (db.images[def.id] ? ' uploaded' : '');
      const th = document.createElement('div'); th.className = 'slot-thumb';
      if (db.images[def.id]) {
        const img = document.createElement('img'); img.src = db.images[def.id]; th.appendChild(img);
      } else { th.textContent = def.emoji; }
      const nm = document.createElement('div'); nm.className = 'slot-name'; nm.textContent = def.name;
      const ac = document.createElement('div'); ac.className = 'slot-action';
      ac.textContent = db.images[def.id] ? '\u2713 \u5909\u66F4\u3059\u308B' : '+ \u30A2\u30C3\u30D7\u30ED\u30FC\u30C9';
      slot.appendChild(th); slot.appendChild(nm); slot.appendChild(ac);
      slot.addEventListener('click', () => { uploadTarget = def.id; document.getElementById('fileIn').click(); });
      sg.appendChild(slot);
    });
    sec.appendChild(sg); body.appendChild(sec);
  });
}

document.getElementById('mgrBtn').addEventListener('click', () => {
  renderManager(); document.getElementById('stampMgr').classList.remove('hide');
});
document.getElementById('backBtn').addEventListener('click', () => {
  document.getElementById('stampMgr').classList.add('hide');
  renderPalette(); renderCalendar();
});

document.getElementById('fileIn').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file || !uploadTarget) return;
  db.images[uploadTarget] = await compress(file, 180, 0.78);
  saveDB(); renderManager();
  e.target.value = ''; uploadTarget = null;
});

// ═══════════════════════════════════════════════════════
// SORT PANEL
// ═══════════════════════════════════════════════════════
function renderSortPanel() {
  const list = document.getElementById('sortList');
  list.innerHTML = '';
  const ordered = getOrderedStamps();
  ordered.forEach((def, idx) => {
    const item = document.createElement('div'); item.className = 'sort-item';

    const th = document.createElement('div'); th.className = 'sort-thumb';
    if (db.images[def.id]) {
      const img = document.createElement('img'); img.src = db.images[def.id]; th.appendChild(img);
    } else { th.textContent = def.emoji; }

    const info = document.createElement('div'); info.className = 'sort-info';
    const nm = document.createElement('div'); nm.className = 'sort-name'; nm.textContent = def.name;
    const cat = CATS.find(c => c.key === def.cat);
    const catLbl = document.createElement('div'); catLbl.className = 'sort-cat-lbl'; catLbl.textContent = cat?.label || '';
    info.appendChild(nm); info.appendChild(catLbl);

    const arrows = document.createElement('div'); arrows.className = 'sort-arrows';
    const upBtn = document.createElement('button'); upBtn.className = 'sort-arrow-btn'; upBtn.textContent = '\u2191';
    if (idx === 0) upBtn.disabled = true;
    upBtn.addEventListener('click', () => {
      const arr = getOrderedStamps().map(s => s.id);
      [arr[idx - 1], arr[idx]] = [arr[idx], arr[idx - 1]];
      db.stampOrder = arr; saveDB(); renderSortPanel();
    });
    const dnBtn = document.createElement('button'); dnBtn.className = 'sort-arrow-btn'; dnBtn.textContent = '\u2193';
    if (idx === ordered.length - 1) dnBtn.disabled = true;
    dnBtn.addEventListener('click', () => {
      const arr = getOrderedStamps().map(s => s.id);
      [arr[idx], arr[idx + 1]] = [arr[idx + 1], arr[idx]];
      db.stampOrder = arr; saveDB(); renderSortPanel();
    });
    arrows.appendChild(upBtn); arrows.appendChild(dnBtn);

    item.appendChild(th); item.appendChild(info); item.appendChild(arrows);
    list.appendChild(item);
  });
}

document.getElementById('sortBtn').addEventListener('click', () => {
  renderSortPanel();
  document.getElementById('sortPanel').classList.remove('hide');
});
document.getElementById('sortBackBtn').addEventListener('click', () => {
  document.getElementById('sortPanel').classList.add('hide');
});
document.getElementById('sortDoneBtn').addEventListener('click', () => {
  document.getElementById('sortPanel').classList.add('hide');
  renderManager();
  renderPalette();
  renderCalendar();
});

// NAVIGATION
// ═══════════════════════════════════════════════════════
document.getElementById('prevBtn').addEventListener('click', () => {
  if (curM === 0) { curM = 11; curY--; } else curM--;
  renderCalendar();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if (curM === 11) { curM = 0; curY++; } else curM++;
  renderCalendar();
});
document.getElementById('todayBtn').addEventListener('click', () => {
  const n = new Date(); curY = n.getFullYear(); curM = n.getMonth();
  selKey = dk(n.getFullYear(), n.getMonth(), n.getDate());
  renderCalendar(); renderDetail();
});

buildThemePicker();
applyTheme(curThemeKey);

selKey = dk(nowDate.getFullYear(), nowDate.getMonth(), nowDate.getDate());

updateHint();
